schema_version: 1
id: custom:numerical_line_source_1550
component_type: beam_source
model_level: ideal

optical:
  source_model: free_space_gaussian
  wavelength_m: 1550 nm
  optical_power_w: 10 mW
  waist_radius_x_m: 3.0 mm
  waist_radius_y_m: 0.25 mm
  m2_x: 1.0
  m2_y: 1.0

validity:
  wavelength_range_m: [1500 nm, 1600 nm]

ports:
  - id: output
    role: output
    interface_type: free_space
    reference_plane: source_waist
    origin_local_m: [0.0, 0.0, 0.0]
    propagation_axis_local: [0.0, 0.0, 1.0]
    transverse_x_local: [1.0, 0.0, 0.0]

provenance:
  type: analytical_reference
  source: docs/specs/INITIAL_BASELINE.md

notes: Numerical elliptical-Gaussian preset; not a Powell lens or commercial line generator.
